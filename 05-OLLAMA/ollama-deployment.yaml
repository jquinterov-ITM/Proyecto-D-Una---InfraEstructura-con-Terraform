apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      automountServiceAccountToken: false
      containers:
      - name: ollama
        image: ollama/ollama:0.1.48
        ports:
        - containerPort: 11434
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
            ephemeral-storage: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
            ephemeral-storage: "2Gi"
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama  # Donde Ollama guarda los modelos
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: efs-pvc-ia  # ← Reutiliza la PVC de Proyecto 3
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
